<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ModernTech HR System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <!-- LOGIN SCREEN -->
      <div v-if="!isLoggedIn" class="login-wrapper">
        <div class="login-box card shadow-lg">
          <div class="card-header bg-dark text-white text-center py-4">
            <h4 class="mb-0 fw-bold">🏢 ModernTech Solutions</h4>
            <small class="opacity-75">HR Management System</small>
          </div>
          <div class="card-body p-4">
            <h5 class="text-center mb-4">Sign In</h5>
            <div v-if="loginError" class="alert alert-danger">
              ⚠️ <span v-text="loginError"></span>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>
              <input
                v-model="loginUsername"
                type="text"
                class="form-control"
                placeholder="Enter username"
              />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <input
                v-model="loginPassword"
                type="password"
                class="form-control"
                placeholder="Enter password"
              />
            </div>
            <button class="btn btn-dark w-100 mt-2" @click="handleLogin">
              Login →
            </button>
            <div class="mt-3 text-center">
              <small class="text-muted">Demo: admin / admin123</small>
            </div>
          </div>
        </div>
      </div>

      <!-- MAIN APP -->
      <div v-if="isLoggedIn">
        <!-- NAVBAR -->
        <nav class="navbar navbar-dark bg-dark px-4">
          <span class="navbar-brand fw-bold fs-5">
            🏢 ModernTech Solutions — HR System
          </span>
          <div class="d-flex align-items-center gap-3">
            <span class="text-white small">
              👤 <span v-text="currentUser.role"></span>
            </span>
            <button class="btn btn-outline-light btn-sm" @click="handleLogout">
              Logout
            </button>
          </div>
        </nav>

        <!-- MAIN LAYOUT -->
        <div class="d-flex" style="min-height: calc(100vh - 56px)">
          <!-- SIDEBAR -->
          <div class="sidebar bg-dark text-white p-3">
            <ul class="nav flex-column">
              <li class="nav-item mb-1">
                <a
                  class="nav-link text-white"
                  :class="{ active: currentPage === 'dashboard' }"
                  @click="currentPage = 'dashboard'"
                  href="#"
                >
                  📊 Dashboard
                </a>
              </li>
              <li class="nav-item mb-1">
                <a
                  class="nav-link text-white"
                  :class="{ active: currentPage === 'employees' }"
                  @click="currentPage = 'employees'"
                  href="#"
                >
                  👥 Employees
                </a>
              </li>
              <li class="nav-item mb-1">
                <a
                  class="nav-link text-white"
                  :class="{ active: currentPage === 'payroll' }"
                  @click="currentPage = 'payroll'"
                  href="#"
                >
                  💰 Payroll
                </a>
              </li>
              <li class="nav-item mb-1">
                <a
                  class="nav-link text-white"
                  :class="{ active: currentPage === 'timeoff' }"
                  @click="currentPage = 'timeoff'"
                  href="#"
                >
                  🗓️ Time Off
                </a>
              </li>
              <li class="nav-item mb-1">
                <a
                  class="nav-link text-white"
                  :class="{ active: currentPage === 'attendance' }"
                  @click="currentPage = 'attendance'"
                  href="#"
                >
                  ✅ Attendance
                </a>
              </li>
            </ul>
          </div>

          <!-- PAGE CONTENT -->
          <div class="flex-grow-1 p-4 bg-light">
            <div v-if="currentPage === 'dashboard'">
              <dashboard-component></dashboard-component>
            </div>
            <div v-if="currentPage === 'employees'">
              <employees-component></employees-component>
            </div>
            <div v-if="currentPage === 'payroll'">
              <payroll-component></payroll-component>
            </div>
            <div v-if="currentPage === 'timeoff'">
              <timeoff-component></timeoff-component>
            </div>
            <div v-if="currentPage === 'attendance'">
              <attendance-component></attendance-component>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Data -->
    <script src="data/employees.js"></script>

    <!-- Components -->
    <script src="components/Dashboard.js"></script>
    <script src="components/Employees.js"></script>
    <script src="components/Payroll.js"></script>
    <script src="components/TimeOff.js"></script>
    <script src="components/Attendance.js"></script>

    <!-- Main app -->
    <script src="main.js"></script>
  </body>
</html>
